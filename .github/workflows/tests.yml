name: tests

# Runs the org-control script tests on every PR + push to main.
# Pure-Python pytest, no secrets or external API calls — safe to fire
# from forks.

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/forks.yml"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - ".github/scripts/**"
      - ".github/forks.yml"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - run: pip install pytest
      - run: python -m pytest .github/scripts/tests/ -v
