# Forks the org-level digest workflow keeps in sync with their upstream
# parent and reports on. Edit this file (not the workflow YAML) when
# adding/removing tracked forks. Each entry:
#
#   repo:               org/name on GitHub (must be a fork).
#   branches:           list of branches to keep in sync via merge-upstream.
#                       Add 20.0 here when OCA cuts it; remove 18.0 when
#                       you stop caring about that release. The script
#                       no-ops branches that don't exist on the fork.
#   upstream_org:       parent org for the [MIG] digest query. null = skip
#                       the digest portion (e.g. non-OCA forks).
#   upstream_track:     branch on upstream to watch for [MIG] activity.
#                       Typically the NEXT major version since migrations
#                       land there.
#   install_forward_port: true = the distributor job pushes
#                       `.github/workflows/forward-port.yml` to this fork
#                       so labelled PRs cherry-pick across `branches`.
#                       Default false; opt-in per fork.

forks:
  # === OCA forks — primary 18.0 + 19.0 tracking ===
  - repo: ledoent/web
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/sale-workflow
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/calendar
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/mis-builder
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/account-financial-reporting
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/account-financial-tools
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/spreadsheet
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/dms
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/bank-statement-import
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/connector-telephony
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/e-commerce
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/social
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/knowledge
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/geospatial
    branches: ["18.0", "19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: true

  - repo: ledoent/OpenUpgrade
    # NOTE: the fork's default branch `ledoent` is a CI overlay
    # (= 19.0 + lab CI customizations). It is deliberately NOT in
    # `branches:` — upstream PRs always target OCA's `19.0`, never
    # the overlay, so merging upstream into `ledoent` is the wrong
    # direction (would drop the overlay's customizations under a
    # conflict). The overlay is rebased on top of 19.0 manually
    # when it drifts too far. Only `19.0` gets auto-synced here.
    branches: ["19.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/server-tools
    branches: ["18.0", "19.0"]
