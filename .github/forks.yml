    upstream_track: "19.0"
    install_forward_port: false

  # === non-OCA forks we maintain meaningful branches on ===
  - repo: ledoent/odoo
    branches: ["18.0"]
    upstream_org: null
    upstream_track: null
    install_forward_port: false

  - repo: ledoent/odoo-cloud-platform
    branches: ["19.0"]
    upstream_org: null
    upstream_track: null
    install_forward_port: false
