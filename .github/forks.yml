# Forks the org-level digest workflow keeps in sync with their upstream
# parent and reports on. Edit this file (not the workflow YAML) when
# adding/removing tracked forks. Each entry:
#
#   repo:               org/name on GitHub (must be a fork).
#   branches:           list of branches to keep in sync via merge-upstream.
#                       Add 20.0 here when OCA cuts it; remove 18.0 when
#                       you stop caring about that release. The script
#                       no-ops branches that don't exist on the fork.
#   upstream_org:       parent org for the [MIG] digest query. null = skip
#                       the digest portion (e.g. non-OCA forks).
#   upstream_track:     branch on upstream to watch for [MIG] activity.
#                       Typically the NEXT major version since migrations
#                       land there.
#   install_forward_port: true = the distributor job pushes
#                       `.github/workflows/forward-port.yml` to this fork
#                       so labelled PRs cherry-pick across `branches`.
#                       Default false; opt-in per fork.
#   rebase_globs:       list of fnmatch globs (e.g. ["19.0-mig-*", "19.0-fix-*"]).
#                       The digest rebases each matching feature branch onto the
#                       freshly-synced `upstream_track` base and force-pushes the
#                       clean ones (PAT push ⇒ the fork's CI re-runs); conflicts
#                       are reported, never pushed. Absent = skip. Opt-in per
#                       fork — only set it where you carry not-yet-merged feature
#                       branches that must track an advancing base.

forks:
  # === OCA forks — primary 18.0 + 19.0 tracking ===
  - repo: ledoent/web
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/sale-workflow
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/calendar
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/mis-builder
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/account-financial-reporting
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/account-financial-tools
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/spreadsheet
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/dms
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/bank-statement-import
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/connector-telephony
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/e-commerce
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/social
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/knowledge
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/geospatial
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/OpenUpgrade
    # NOTE: the fork's default branch `ledoent` is a CI overlay
    # (= 19.0 + lab CI customizations). It is deliberately NOT in
    # `branches:` — upstream PRs always target OCA's `19.0`, never
    # the overlay, so merging upstream into `ledoent` is the wrong
    # direction (would drop the overlay's customizations under a
    # conflict). Only `19.0` gets fast-forward-synced via `branches:`.
    # The overlay AND the unmerged migration branches need a REBASE onto
    # 19.0 (the merge-upstream API can't rebase) — `rebase_globs` below
    # makes the daily fork-sync (fork_sync_digest.rebase_feature_branches)
    # rebase each matching branch onto the freshly-synced 19.0 and
    # force-push it, so the fork CI re-runs. Replaces the old "rebased
    # manually when it drifts" path that silently let `ledoent` fall 47
    # commits behind.
    branches: ["19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false
    rebase_globs: ["ledoent", "19.0-mig-*", "19.0-fix-*"]

  - repo: ledoent/server-tools
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  - repo: ledoent/ddmrp
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false
    # ~16 not-yet-upstreamed submodule MIGs + a few fixes ride on top of
    # OCA 19.0; keep them rebased nightly so each is mergeable when we open
    # its PR (1-2/day cadence).
    rebase_globs: ["19.0-mig-*", "19.0-fix-*"]

  - repo: ledoent/report-print-send
    branches: ["18.0", "19.0", "20.0"]
    upstream_org: OCA
    upstream_track: "19.0"
    install_forward_port: false

  # === non-OCA forks we maintain meaningful branches on ===
  - repo: ledoent/odoo
    branches: ["18.0"]
    upstream_org: null
    upstream_track: null
    install_forward_port: false

  - repo: ledoent/odoo-cloud-platform
    branches: ["19.0"]
    upstream_org: null
    upstream_track: null
    install_forward_port: false

  # === self-hosted Sentry stack ===
  # Sentry uses calendar versioning (26.x) + a fast-moving master.
  # We track master so PR conflict detection on *-kencove rebase
  # branches actually reflects reality. Without the sync, the fork's
  # master sits frozen at fork-creation time (Feb 2026, 26.2.0) and
  # every PR shows false conflicts against an obsolete base.
  - repo: ledoent/sentry
    branches: ["master"]
    upstream_org: null   # no [MIG]-style PR digest for non-OCA forks
    upstream_track: null
    install_forward_port: false

  # ledoent/seer's upstream (getsentry/seer) is private, so the
  # merge-upstream API call would 404 with our PAT. Tracked here only
  # to document that we know it exists; sync stays manual via the
  # feature/explorer-endpoints rebase pattern.
  # - repo: ledoent/seer
  #   branches: ["main"]
  #   upstream_org: null
  #   upstream_track: null
  #   install_forward_port: false
